<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A beautiful and dynamic web application to check current weather conditions around the globe." />
  <title>Weather App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="glass-panel container">
    <div class="header">
      <h1 id="appTitle">🌤️ Weather</h1>
    </div>
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off" />
      <button id="searchBtn" onclick="getWeather()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </button>
    </div>
    <div class="weather-info" id="weatherInfo">
      <div class="empty-state">
        <p>Type a city and hit enter or click search</p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
